# Render Blueprint 配置（本地准备，尚未部署）
# 用途：在 Render 控制台用此文件一键创建 Node Web Service。
# 部署前请人工确认本文件，再在 Render 中 Connect 仓库并 Apply。
#
# 重要说明：
# - PORT 由 Render 自动注入（环境变量），无需在 envVars 中写死，
#   应用已通过 process.env.PORT || 3001 读取并绑定 0.0.0.0。
# - region: oregon 为免费版可用区；若面向中国用户想降低延迟，
#   可改为 singapore（需付费套餐）。
# - plan: free 适合演示；免费版在无请求约 15 分钟后会休眠（冷启动约几十秒）。

services:
  - type: web
    name: ai-research-platform
    runtime: node
    plan: free
    region: oregon
    # 不写死 branch：Render 会自动使用所连仓库的默认分支（main/master 等）
    # Render 会先自动执行 npm install，再执行 buildCommand
    # NODE_ENV=production makes npm omit devDependencies by default, while the
    # frontend compiler (Vite) intentionally lives in devDependencies.
    # Prisma only needs a syntactically valid URL while generating the client;
    # runtime database access still requires a real DATABASE_URL in Render.
    buildCommand: npm ci --include=dev && DATABASE_URL=postgresql://preview:preview@localhost:5432/preview npm run db:generate && npm run build
    # Apply checked-in migrations before accepting traffic. This is idempotent
    # and uses DIRECT_URL when configured, otherwise DATABASE_URL.
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: CLS_FREE_NEWS_ENABLED
        value: "true"
      - key: SINA_FREE_NEWS_ENABLED
        value: "true"
      - key: CNINFO_ENABLED
        value: "true"
      - key: FINANCE_LLM_PROVIDER
        value: deepseek
      - key: FINANCE_LLM_BASE_URL
        value: https://api.deepseek.com
      - key: FINANCE_LLM_MODEL
        value: deepseek-v4-flash
      # DeepSeek 密钥只在 Render 控制台添加，不提交到 GitHub：
      # FINANCE_LLM_BASE_URL=https://api.deepseek.com
      # FINANCE_LLM_MODEL=deepseek-v4-flash
      # FINANCE_LLM_API_KEY=<Render secret>
